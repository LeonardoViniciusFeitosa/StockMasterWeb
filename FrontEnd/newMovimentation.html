<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentacao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/b2f3875084.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="media/img/Logo.png" type="image/x-icon">
</head>
<body>
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1055;"></div>
    <div id="headerMount"></div>
    <div class="container-fluid">
        <div class="row layout">
            <aside id="sidebarMount"></aside>
            <main class="col-xl-10 col-12 content-area d-flex flex-column align-items-center">
                <div class="screen col-10">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
                        <div>
                            <h1>Nova Movimentacao</h1>
                            <h5 class="text-secondary">Cadastre uma nova movimentacao de estoque</h5>
                        </div>
                        <a href="MovementList.html" class="btn btn-outline-primary">Ver Lista</a>
                    </div>
                    <div class="section shadow-lg p-4">
                        <form id="movementForm" class="form-group mt-3">
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="movementType" class="form-label fs-5 fw-bold">Tipo</label>
                                    <select id="movementType" class="form-select bg-light" required>
                                        <option value="">Selecione...</option>
                                        <option value="ENTRY">Entrada</option>
                                        <option value="EXIT">Saida</option>
                                    </select>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="movementDate" class="form-label fs-5 fw-bold">Data</label>
                                    <input type="date" id="movementDate" class="form-control bg-light" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="productId" class="form-label fs-5 fw-bold">Produto</label>
                                    <select id="productId" class="form-select bg-light" required></select>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="quantity" class="form-label fs-5 fw-bold">Quantidade</label>
                                    <input type="number" id="quantity" class="form-control bg-light" min="1" value="1" required>
                                </div>
                                <div class="col-12">
                                    <label for="notes" class="form-label fs-5 fw-bold">Observacoes</label>
                                    <textarea id="notes" class="form-control bg-light" rows="4"></textarea>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end mt-4">
                                <button id="saveButton" class="btn btn-primary px-4" type="submit">Cadastrar Movimentacao</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div id="offcanvasMount"></div>
    <div id="modalMount"></div>
    <script type="module" src="js/movementForm.js"></script>
</body>
</html>
