<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/b2f3875084.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="media/img/Logo.png" type="image/x-icon">
</head>
<body class="d-flex align-items-center justify-content-center">
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1055;"></div>
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        <div class="section shadow-lg p-4">
            <div class="text-center mb-4">
                <img src="media/img/Logo.png" class="logotype mb-2" alt="Logo">
                <h1 class="h3 mb-1">StockMaster</h1>
                <p class="text-secondary mb-0">Entre para acessar o sistema</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">Usuário</label>
                    <input type="text" id="username" class="form-control bg-light" autocomplete="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold">Senha</label>
                    <input type="password" id="password" class="form-control bg-light" autocomplete="current-password" required>
                </div>
                <button id="loginButton" class="btn btn-primary w-100" type="submit">Entrar</button>
                <p class="text-secondary small mt-3 mb-0">Usuário inicial: <strong>admin</strong> | Senha inicial: <strong>admin</strong></p>
            </form>
        </div>
    </div>
    <script type="module" src="js/login.js"></script>
</body>
</html>
