<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/b2f3875084.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="media/img/Logo.png" type="image/x-icon">
</head>
<body>
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1055;"></div>
    <div id="headerMount"></div>
    <div class="container-fluid">
        <div class="row layout">
            <aside id="sidebarMount"></aside>
            <main class="col-xl-10 col-12 content-area d-flex flex-column align-items-center">
                <div class="screen col-10">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
                        <div>
                            <h1>Cadastro de Vendas</h1>
                            <h5 class="text-secondary">Cadastre uma venda realizada</h5>
                        </div>
                        <a href="SaleList.html" class="btn btn-outline-primary">Ver Lista</a>
                    </div>
                    <div class="section shadow-lg p-4">
                        <form id="saleForm">
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="customerId" class="form-label fs-5 fw-bold">Cliente</label>
                                    <select id="customerId" class="form-select bg-light" required></select>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="saleDate" class="form-label fs-5 fw-bold">Data da Venda</label>
                                    <input type="date" id="saleDate" class="form-control bg-light" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="productId" class="form-label fs-5 fw-bold">Produto</label>
                                    <select id="productId" class="form-select bg-light"></select>
                                </div>
                                <div class="col-12 col-md-2">
                                    <label for="quantity" class="form-label fs-5 fw-bold">Quantidade</label>
                                    <input type="number" id="quantity" class="form-control bg-light" min="1" value="1">
                                </div>
                                <div class="col-12 col-md-2">
                                    <label for="itemValue" class="form-label fs-5 fw-bold">Valor</label>
                                    <input type="text" id="itemValue" class="form-control bg-light" readonly>
                                </div>
                                <div class="col-12 col-md-2 d-flex align-items-end">
                                    <button id="addItemButton" class="btn btn-primary w-100" type="button">Adicionar</button>
                                </div>
                            </div>
                            <div class="table-responsive table-container mt-4">
                                <table class="table text-center" style="table-layout: fixed">
                                    <thead>
                                        <tr>
                                            <th>Produto</th>
                                            <th>Quantidade</th>
                                            <th>Valor</th>
                                            <th>Acoes</th>
                                        </tr>
                                    </thead>
                                    <tbody id="saleItemsBody">
                                        <tr>
                                            <td colspan="4" class="text-muted py-4">Nenhum item adicionado.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="row g-3 mt-2">
                                <div class="col-12 col-md-6">
                                    <label for="totalValue" class="form-label fs-5 fw-bold">Valor Total</label>
                                    <input type="text" id="totalValue" class="form-control bg-light" readonly value="R$ 0,00">
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="profitValue" class="form-label fs-5 fw-bold">Lucro</label>
                                    <input type="text" id="profitValue" class="form-control bg-light" readonly value="R$ 0,00">
                                </div>
                            </div>
                            <div class="d-flex justify-content-end mt-4">
                                <button id="finishSale" class="btn btn-primary px-4" type="button">Cadastrar Venda</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div id="offcanvasMount"></div>
    <div id="modalMount"></div>
    <script type="module" src="js/newSale.js"></script>
</body>
</html>
