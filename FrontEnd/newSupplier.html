<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornecedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/b2f3875084.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="media/img/Logo.png" type="image/x-icon">
</head>
<body>
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1055;"></div>
    <div id="headerMount"></div>
    <div class="container-fluid">
        <div class="row layout">
            <aside id="sidebarMount"></aside>
            <main class="col-xl-10 col-12 content-area d-flex flex-column align-items-center">
                <div class="screen col-10">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
                        <div>
                            <h1 id="pageTitle">Novo Fornecedor</h1>
                            <h5 id="pageSubtitle" class="text-secondary">Preencha os dados do fornecedor</h5>
                        </div>
                        <a href="SupplierList.html" class="btn btn-outline-primary">Ver Lista</a>
                    </div>
                    <div class="section shadow-lg p-4">
                        <form id="supplierForm" class="form-group mt-3">
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="name" class="form-label fs-5 fw-bold">Nome</label>
                                    <input type="text" id="name" class="form-control bg-light" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="taxId" class="form-label fs-5 fw-bold">CNPJ</label>
                                    <input type="text" id="taxId" class="form-control bg-light" required>
                                </div>
                                <div class="col-12">
                                    <label for="address" class="form-label fs-5 fw-bold">Endereco</label>
                                    <input type="text" id="address" class="form-control bg-light" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="phoneNumber" class="form-label fs-5 fw-bold">Telefone</label>
                                    <input type="text" id="phoneNumber" class="form-control bg-light" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="email" class="form-label fs-5 fw-bold">Email</label>
                                    <input type="email" id="email" class="form-control bg-light" required>
                                </div>
                                <div class="col-12">
                                    <label for="notes" class="form-label fs-5 fw-bold">Observacoes</label>
                                    <textarea id="notes" class="form-control bg-light" rows="4"></textarea>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end mt-4">
                                <button id="saveButton" class="btn btn-primary px-4" type="submit">Cadastrar Fornecedor</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div id="offcanvasMount"></div>
    <div id="modalMount"></div>
    <script type="module" src="js/supplierForm.js"></script>
</body>
</html>
