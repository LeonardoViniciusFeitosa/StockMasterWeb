<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/b2f3875084.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="media/img/Logo.png" type="image/x-icon">
</head>
<body>
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1055;"></div>
    <div id="headerMount"></div>
    <div class="container-fluid">
        <div class="row layout">
            <aside id="sidebarMount"></aside>
            <main class="col-xl-10 col-12 content-area">
                <div class="row g-4">
                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card shadow border-0 stat-card">
                            <div class="card-header bg-primary text-white"><h6 class="m-0 h5 text-center">Produtos em Estoque</h6></div>
                            <div class="card-body d-flex justify-content-center align-items-center gap-3"><i class="fa-solid fa-box text-primary h2"></i><h3 class="fw-bold h2 m-0" id="total">0</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card shadow border-0 stat-card">
                            <div class="card-header bg-warning text-white"><h6 class="m-0 h5 text-center">Baixo Estoque</h6></div>
                            <div class="card-body d-flex justify-content-center align-items-center gap-3"><i class="fa-solid fa-triangle-exclamation text-warning h2"></i><h3 class="fw-bold h2 m-0" id="lowStockCount">0</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card shadow border-0 stat-card">
                            <div class="card-header bg-primary text-white"><h6 class="m-0 h5 text-center">Vendas do Dia</h6></div>
                            <div class="card-body d-flex justify-content-center align-items-center gap-3"><i class="fa-solid fa-money-bill-1 text-primary h2"></i><h3 class="fw-bold h2 m-0" id="dailySalesCount">0</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card shadow border-0 stat-card">
                            <div class="card-header bg-primary text-white"><h6 class="m-0 h5 text-center">Vendas do Mes</h6></div>
                            <div class="card-body d-flex justify-content-center align-items-center gap-3"><i class="fa-solid fa-calendar text-primary h2"></i><h3 class="fw-bold h2 m-0" id="monthlySalesCount">0</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card shadow border-0 stat-card">
                            <div class="card-header bg-success text-white"><h6 class="m-0 h5 text-center">Receita do Mes</h6></div>
                            <div class="card-body"><h3 class="text-center fw-bold h2 m-0" id="monthlySalesValue">R$ 0,00</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card shadow border-0 stat-card">
                            <div class="card-header bg-success text-white"><h6 class="m-0 h5 text-center">Lucro do Mes</h6></div>
                            <div class="card-body"><h3 class="text-center fw-bold h2 m-0" id="monthlyProfit">R$ 0,00</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card shadow border-0 stat-card">
                            <div class="card-header bg-success text-white"><h6 class="m-0 h5 text-center">Receita do Dia</h6></div>
                            <div class="card-body"><h3 class="text-center fw-bold h2 m-0" id="dailySalesValue">R$ 0,00</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card shadow border-0 stat-card">
                            <div class="card-header bg-success text-white"><h6 class="m-0 h5 text-center">Lucro do Dia</h6></div>
                            <div class="card-body"><h3 class="text-center fw-bold h2 m-0" id="dailyProfit">R$ 0,00</h3></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div id="offcanvasMount"></div>
    <div id="modalMount"></div>
    <script type="module" src="js/Dashboard.js"></script>
</body>
</html>
