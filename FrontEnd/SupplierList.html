<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornecedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/b2f3875084.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="media/img/Logo.png" type="image/x-icon">
</head>
<body>
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1055;"></div>
    <div id="headerMount"></div>
    <div class="container-fluid">
        <div class="row layout">
            <aside id="sidebarMount"></aside>
            <main class="col-xl-10 col-12 content-area d-flex flex-column align-items-center">
                <div class="screen col-10">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
                        <div><h1>Lista de Fornecedores</h1><h5 class="text-secondary">Consulte e gerencie os fornecedores</h5></div>
                        <a href="newSupplier.html" class="btn btn-outline-primary">Novo Fornecedor</a>
                    </div>
                    <div class="section shadow-lg p-4">
                        <div class="table-responsive table-container">
                            <table class="table text-center align-middle">
                                <thead><tr><th>ID</th><th>Nome</th><th>CNPJ</th><th>Telefone</th><th>Email</th><th>Acoes</th></tr></thead>
                                <tbody id="entityTableBody"><tr><td colspan="6" class="text-muted py-4">Carregando fornecedores...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div id="offcanvasMount"></div>
    <div id="modalMount"></div>
    <script type="module" src="js/supplierList.js"></script>
</body>
</html>
